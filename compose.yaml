services:
  kquant:
    build: .
    expose:
      - "8501"
    environment:
      DART_API_KEY: ${DART_API_KEY:?Set DART_API_KEY in your local .env file}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:?Set APP_ACCESS_PASSWORD in your local .env file}
      STREAMLIT_SERVER_COOKIE_SECRET: ${STREAMLIT_SERVER_COOKIE_SECRET:?Set STREAMLIT_SERVER_COOKIE_SECRET in your local .env file}
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    depends_on:
      kquant:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN to the public hostname for K-Quant}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    internal: false

volumes:
  caddy_data:
  caddy_config:

# Bounded log retention on every service so a chatty container can never
# fill the host disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: kquant
      POSTGRES_USER: kquant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kquant -d kquant"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [data]
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=1777
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    logging: *default-logging
    # AOF persistence: login sessions, rate-limit counters, and queued Celery
    # jobs survive a Redis or host restart instead of logging everyone out.
    command: ["redis-server", "--save", "", "--appendonly", "yes", "--dir", "/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [data]
    read_only: true
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    logging: *default-logging
    command: >
      sh -c "alembic upgrade head &&
             uvicorn platform_api.main:app --host=0.0.0.0 --port=8000"
    environment:
      DATABASE_URL: postgresql+psycopg://kquant:${POSTGRES_PASSWORD}@postgres:5432/kquant
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://${DOMAIN}
      AUTH_MODE: ${AUTH_MODE:-session}
      AUTH_COOKIE_SECRET: ${AUTH_COOKIE_SECRET:?Set AUTH_COOKIE_SECRET in .env}
      COGNITO_REGION: ${COGNITO_REGION:-}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      FRONTEND_URL: https://${DOMAIN}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    expose: ["8000"]
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [app, data]
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: auth-server/Dockerfile
    logging: *default-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kquant:${POSTGRES_PASSWORD}@postgres:5432/kquant
      REDIS_URL: redis://redis:6379/0
      AUTH_COOKIE_SECRET: ${AUTH_COOKIE_SECRET:?Set AUTH_COOKIE_SECRET in .env}
      # Signup stays closed in production unless the operator opts in.
      AUTH_ALLOW_SIGNUP: ${AUTH_ALLOW_SIGNUP:-false}
      AUTH_PUBLIC_URL: https://${DOMAIN}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    expose: ["4000"]
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/auth/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [app, data]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    logging: *default-logging
    command: celery -A platform_api.celery_app.celery_app worker --loglevel=INFO --concurrency=1
    environment:
      DATABASE_URL: postgresql+psycopg://kquant:${POSTGRES_PASSWORD}@postgres:5432/kquant
      REDIS_URL: redis://redis:6379/0
      DART_API_KEY: ${DART_API_KEY:?Set DART_API_KEY in .env}
      AUTH_MODE: ${AUTH_MODE:-session}
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      # A broker round-trip proves the worker process is alive and consuming.
      test: ["CMD-SHELL", "celery -A platform_api.celery_app.celery_app inspect ping --timeout 10 | grep -q pong"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /app/docs_cache:size=128m,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: 3g
    cpus: 2.0
    networks: [app, data]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-session}
        NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
        NEXT_PUBLIC_COGNITO_APP_CLIENT_ID: ${COGNITO_APP_CLIENT_ID:-}
        NEXT_PUBLIC_COGNITO_DOMAIN: ${COGNITO_DOMAIN:-}
        NEXT_PUBLIC_AUTH_REDIRECT_URL: https://${DOMAIN}
    logging: *default-logging
    expose: ["3000"]
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.75
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [app]
    restart: unless-stopped

  # Streamlit research/admin interface, published at analytics.DOMAIN and
  # gated by APP_ACCESS_PASSWORD inside the app.
  analytics:
    build: .
    logging: *default-logging
    environment:
      DART_API_KEY: ${DART_API_KEY:?Set DART_API_KEY in .env}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:?Set APP_ACCESS_PASSWORD in .env}
      STREAMLIT_SERVER_COOKIE_SECRET: ${STREAMLIT_SERVER_COOKIE_SECRET:?Set STREAMLIT_SERVER_COOKIE_SECRET in .env}
    expose: ["8501"]
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0
    networks: [app]
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    logging: *default-logging
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:-auth.invalid}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.platform:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api: { condition: service_healthy }
      frontend: { condition: service_started }
      analytics: { condition: service_started }
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    networks: [app]
    restart: unless-stopped

networks:
  app:
  data:
    internal: true

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
